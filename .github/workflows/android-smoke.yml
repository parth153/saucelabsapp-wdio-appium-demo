name: Android Smoke Tests

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Enable KVM for hardware acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Cache AVD
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-33-default-${{ runner.os }}

      - name: Create AVD and generate snapshot (first run only)
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: default
          arch: x86_64
          profile: pixel_5
          avd-name: test_avd
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -port 5554
          disable-animations: false
          script: echo "AVD created and snapshot saved."

      - name: Run smoke tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: default
          arch: x86_64
          profile: pixel_5
          avd-name: test_avd
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot-save -port 5554
          disable-animations: true
          script: |
            echo "Emulator ready: $(adb devices)"
            adb wait-for-device shell 'while [ "$(getprop sys.boot_completed)" != "1" ]; do sleep 1; done'

            npx appium --port 4723 --log appium.log &
            APPIUM_PID=$!

            APPIUM_WAIT=0
            until curl -sf http://127.0.0.1:4723/status > /dev/null; do
              sleep 2
              APPIUM_WAIT=$((APPIUM_WAIT + 2))
              if [ $APPIUM_WAIT -ge 60 ]; then
                echo "ERROR: Appium did not become ready within 60 seconds"
                pkill -f appium 2>/dev/null || true
                exit 1
              fi
            done
            echo "Appium is ready."

            npx wdio run config/wdio.android.conf.ts --mochaOpts.grep "[smoke]"
            TEST_EXIT=$?

            pkill -f appium 2>/dev/null || true
            adb emu kill 2>/dev/null || true
            sleep 3
            pkill -f emulator 2>/dev/null || true
            exit $TEST_EXIT

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-smoke
          path: allure-results/
          retention-days: 1

      - name: Upload Appium logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: appium-logs-smoke
          path: appium.log
          retention-days: 7

  report:
    needs: smoke
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-smoke
          path: allure-results/

      - name: Generate Allure report
        run: npx allure generate allure-results --clean -o allure-report

      - name: Upload Allure report artifact
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-smoke
          path: allure-report/
          retention-days: 30

  deploy-pages:
    needs: report
    if: always()
    runs-on: ubuntu-latest

    concurrency:
      group: pages-${{ github.ref }}
      cancel-in-progress: true

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Download Allure report artifact
        uses: actions/download-artifact@v4
        with:
          name: allure-report-smoke
          path: allure-report/

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload report to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
