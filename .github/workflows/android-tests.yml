name: Android Appium Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  android-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        shard:
          - name: login-products
            specs: "src/tests/android/login.spec.ts,src/tests/android/products.spec.ts"
          - name: cart-checkout
            specs: "src/tests/android/cart.spec.ts,src/tests/android/checkout.spec.ts"
          - name: productDetail-sideMenu-extendedFeatures
            specs: "src/tests/android/productDetail.spec.ts,src/tests/android/sideMenu.spec.ts,src/tests/android/extendedFeatures.spec.ts"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Enable KVM for hardware acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Android tests on emulator (${{ matrix.shard.name }})
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          profile: pixel_5
          avd-name: test_avd
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -port 5554
          disable-animations: true
          script: |
            adb wait-for-device shell 'while [[ -z $(getprop sys.boot_completed) ]]; do sleep 2; done'
            echo "Emulator serial: $(adb devices)"

            npx appium --port 4723 --log appium.log &
            APPIUM_PID=$!

            timeout 60 bash -c 'until curl -sf http://127.0.0.1:4723/status > /dev/null; do sleep 2; done'
            echo "Appium is ready."

            SPEC_FILES="${{ matrix.shard.specs }}" npx wdio run config/wdio.android.conf.ts
            TEST_EXIT=$?

            kill $APPIUM_PID 2>/dev/null || true
            exit $TEST_EXIT

      - name: Upload Allure results for shard
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.shard.name }}
          path: allure-results/
          retention-days: 1

      - name: Upload Appium logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: appium-logs-${{ matrix.shard.name }}
          path: appium.log
          retention-days: 7

  report:
    needs: android-tests
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Download all Allure results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          path: allure-results-all/
          merge-multiple: true

      - name: Generate Allure report
        run: npx allure generate allure-results-all --clean -o allure-report

      - name: Upload Allure report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30

  deploy-pages:
    needs: report
    if: always() && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    concurrency:
      group: pages-${{ github.ref }}
      cancel-in-progress: true

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Download Allure report artifact
        uses: actions/download-artifact@v4
        with:
          name: allure-report
          path: allure-report/

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload report to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
